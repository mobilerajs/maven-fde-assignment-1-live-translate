app = "raj-livetranslate-ai"
primary_region = "sjc"

[build]
  dockerfile = "backend/ai-service-python/Dockerfile"

[env]
  MODEL = "claude-sonnet-4-6"
  TRANSLATION_DB_PATH = "/data/translations.db"

[mounts]
  source = "translations_data"
  destination = "/data"

# Private service: no public IPs are allocated (flycast only) — the browser
# never talks to this app directly, only the gateway can reach it.
[http_service]
  internal_port = 8000
  force_https = false
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
