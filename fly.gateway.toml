app = "raj-livetranslate-gw"
primary_region = "sjc"

[build]
  dockerfile = "backend/gateway-node/Dockerfile"

[env]
  PORT = "8787"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
